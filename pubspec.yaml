name: mobile_scanner
description: A universal Flutter barcode and QR code scanner using CameraX/ML Kit for Android, AVFoundation/Apple Vision for iOS & macOS, and ZXing for web.
version: 8.0.0
publish_to: none
repository: https://github.com/juliansteenbakker/mobile_scanner

screenshots:
- description: 'Mobile Scanner Example'
  path: example/screenshots/example_advanced.png
- description: 'Mobile Scanner Example Settings'
  path: example/screenshots/example_advanced_settings.png
- description: 'Mobile Scanner Example Homepage'
  path: example/screenshots/homepage.png

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  collection: ">=1.19.1 <2.0.0"
  ffi: ">=2.2.0 <3.0.0"
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  meta: ">=1.18.3"  
  plugin_platform_interface:
    git: https://github.com/kumsumit/plugin_platform_interface.git
  web: ">=1.1.1 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ">=10.2.0 <11.0.0"

flutter:
  plugin:
    platforms:
      android:
        package: dev.steenbakker.mobile_scanner
        pluginClass: MobileScannerPlugin
      ios:
        pluginClass: MobileScannerPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: MobileScannerPlugin
        sharedDarwinSource: true
      web:
        pluginClass: MobileScannerWeb
        fileName: src/web/mobile_scanner_web.dart
      # Desktop: FFI-only plugins (no platform channel). They build the native
      # ZXing-C++ engine and expose image/byte decoding via dart:ffi. Live
      # camera capture on desktop is a separate follow-on (no capture backend).
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
